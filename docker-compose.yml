services:
  whatsapp-scheduler:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PORT=3000
      - TZ=Europe/Paris
      - ANTI_SPAM_DELAY=15
    restart: unless-stopped
    shm_size: '512mb'
    mem_limit: 1200m
    mem_reservation: 600m
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/users"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 90s
